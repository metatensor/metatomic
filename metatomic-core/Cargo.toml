[package]
name = "metatomic-core"
version = "0.1.0"
edition = "2021"
publish = false
rust-version = "1.74"
exclude = [
    "tests"
]

[lib]
crate-type = ["cdylib", "staticlib"]
name = "metatomic"
bench = false

[dependencies]
once_cell = "1"


[build-dependencies]
cbindgen = { version = "0.29", default-features = false }


[dev-dependencies]
lazy_static = "1"
which = "8"
